<h2>Главная</h2>

<form id="todo-form" autocomplete="off">
  <input id="todo-input" type="text" placeholder="Новая задача" required />
  <button type="submit">Добавить</button>
</form>

<form id="reminder-form" autocomplete="off" style="margin-top: 12px">
  <input id="reminder-text" type="text" placeholder="Текст напоминания" required />
  <input id="reminder-time" type="datetime-local" required />
  <button type="submit">Добавить с напоминанием</button>
</form>

<ul id="todo-list"></ul>
