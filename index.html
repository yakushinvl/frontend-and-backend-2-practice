<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>ToDo (App Shell)</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Список дел</h1>
        <nav>
          <button id="home-btn" type="button" class="tab active">Главная</button>
          <button id="about-btn" type="button" class="tab">О приложении</button>
        </nav>
      </header>

      <section id="app-content" aria-live="polite"></section>

      <p id="sw-status"></p>
    </main>

    <noscript>Для работы приложения нужен JavaScript.</noscript>
    <script src="/app.js" defer></script>
  </body>
</html>
