<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки (Офлайн)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <style>
        body { padding: 20px; max-width: 600px; margin: 0 auto; }
        ul { list-style: none; padding: 0; }
        li {
            background: #f5f5f5;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<h1>📝 Мои заметки (офлайн-режим)</h1>

<form id="note-form" class="row">
    <input class="col-9" type="text" id="note-input"
           placeholder="Введите заметку" required>
    <button class="col-3" type="submit">Добавить</button>
</form>

<ul id="notes-list"></ul>

<script src="app.js"></script>
</body>
</html>
